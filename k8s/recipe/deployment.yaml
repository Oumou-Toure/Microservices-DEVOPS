apiVersion: apps/v1
kind: Deployment
metadata:
  name: recipe-service
  labels:
    app: recipe-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recipe-service
  template:
    metadata:
      labels:
        app: recipe-service
    spec:
      containers:
        - name: recipe-service
          image: oumoutoure/recipe-service:latest
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: "file:./dev.db"
            - name: JWT_SECRET
              value: "change-me"
            - name: PORT
              value: "5000"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 2
            periodSeconds: 5